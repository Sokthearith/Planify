name: Database Backup

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MySQL client and GPG
        run: sudo apt-get update && sudo apt-get install -y mysql-client gnupg

      - name: Run mysqldump
        run: |
          mysqldump \
            -h "${{ secrets.DB_HOST }}" \
            -P "${{ secrets.DB_PORT }}" \
            -u "${{ secrets.DB_USER }}" \
            -p"${{ secrets.DB_PASSWORD }}" \
            --ssl-mode=REQUIRED \
            --single-transaction \
            --quick \
            --routines \
            --triggers \
            "${{ secrets.DB_NAME }}" \
            | gzip > planify_$(date +%Y%m%d_%H%M%S).sql.gz

      - name: Encrypt backup with passphrase
        run: |
          echo "${{ secrets.BACKUP_PASSPHRASE }}" | gpg --symmetric \
            --passphrase-fd 0 \
            --batch \
            --cipher-algo AES256 \
            *.sql.gz

      - name: Upload encrypted artifact
        uses: actions/upload-artifact@v4
        with:
          name: planify-backup-encrypted
          path: "*.gpg"
          retention-days: 30
